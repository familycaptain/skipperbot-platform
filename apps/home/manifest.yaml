id: home
name: Home
version: "1.0.0"
description: >
  Home management hub — maintenance tasks, appliances, insurance, and home issues.
  Tracks recurring maintenance, repairs, and problems around the household.
onboarding_tour: true  # included in the first-run onboarding tour

platform_deps:
  - images          # home_issue_images references public.images

entity_types:
  - prefix: "hmt"
    name: Home Task
    table: home_tasks
  - prefix: "hmtl"
    name: Home Task Log
    table: home_task_log
  - prefix: "ha"
    name: Home Appliance
    table: home_appliances

tool_category:
  description: >
    Manage recurring home maintenance tasks like A/C filter changes, septic
    treatment, gutter cleaning, etc., and track home issues and repairs.
  keywords:
    # Common household locations
    - garage
    - attic
    - closet
    - shed
    - basement
    - pantry
    - laundry room
    - kitchen
    - bedroom
    - bathroom
    - living room
    - dining room
    - office
    - den
    - patio
    - porch
    - mudroom
    - utility room
    - guest room
    - nightstand
    - dresser
    - workbench
    # Home maintenance
    - home maintenance
    - house maintenance
    - maintenance task
    - maintenance schedule
    - a/c filter
    - air filter
    - hvac
    - septic
    - gutter
    - overdue maintenance
    - what's due
    - home task
    - recurring task
    - around the house
    - clean the
    - service the
    # Appliances
    - appliance
    - refrigerator
    - fridge
    - dishwasher
    - washer
    - dryer
    - hvac
    - furnace
    - water heater
    - warranty
    - serial number
    - model number
