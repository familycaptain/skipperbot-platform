id: home
name: Home
version: "1.0.0"
description: >
  Home management hub — item locator, maintenance, appliances, and insurance.
  The Locator tab tracks physical items and their storage locations around the
  household.

platform_deps:
  - images          # locator_images references public.images

entity_types:
  - prefix: "loc"
    name: Located Item
    table: located_items
  - prefix: "iloc"
    name: Item Location
    table: item_locations
  - prefix: "hmt"
    name: Home Task
    table: home_tasks
  - prefix: "hmtl"
    name: Home Task Log
    table: home_task_log

tool_category:
  description: >
    Track where physical items are stored in the household — find things
    by location, category, or search. Also manage recurring home maintenance
    tasks like A/C filter changes, septic treatment, gutter cleaning, etc.
