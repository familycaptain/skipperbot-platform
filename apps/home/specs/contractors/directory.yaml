kind: specification
id: home.contractors.directory
title: Home Contractors tab is a real feature (service-provider directory)
state: live
autonomy: gated
behavior: The Home Contractors tab lists home service providers (name, trade, company, phone,
  email, rating [1-5 stars], last_used, jobs_history, notes) with search + trade filter +
  add/edit/delete, replacing the placeholder. Each mutation persists to app_home.home_contractors
  and emits digest_record; agent tools give cross-surface parity. Rating is validated 1-5
  at the DB (CHECK) and normalized app-side (out-of-range -> null). Empty tab (no active search/trade
  filter) shows the per-view hero; filtered zero-result keeps normal text.
implements:
- apps/home/migrations/007_contractors.sql
- apps/home/data.py
- apps/home/routes.py
- apps/home/tools.py
- apps/home/manifest.yaml
- apps/home/ui/HomeApp.jsx
- apps/home/ui/index.js
- web/src/apps/emptyStateHero.js
tests: []
links: {}
