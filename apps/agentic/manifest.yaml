id: agentic
name: Routines
version: "1.0.0"
description: >
  Routines (#109) — Skipper running a saved PROMPT on a SCHEDULE with a chosen
  set of tool CATEGORIES. The prompt lives in a document (d-*); the schedule row
  IS the routine (its job_config carries the spec); when due, an `agentic` job
  runs the prompt through the agent loop with the same tools a chat turn has. The
  prompt drives everything the routine does — including notifying people, if it
  says to. ("agentic" survives as the internal app-id / job-type code name.)

platform_deps:
  - documents   # the prompt lives in a d-* document (editable in chat or the doc app)
  - schedules   # each routine is a public.schedules row; job_config carries the spec
  - jobs        # the `agentic` job_type runs on the dispatcher

# The generic routine job handler. A schedule with linked_entity_type='job',
# linked_entity_id='agentic' fires it with the routine's job_config as config.
job_types:
  - type: agentic
    handler: agentic.handle_agentic
    max_concurrent: 2
    cancel_on_shutdown: true

# Tool category for the keyword router — surfaces create_routine etc. when a
# family member asks Skipper to do something on its own, on a schedule.
tool_category:
  description: >
    Set up, list, or remove ROUTINES — Skipper doing something on
    its own on a recurring schedule (a saved prompt + tools that run every
    morning, nightly, weekly, etc.). Use when the user asks Skipper to do
    something automatically / on a schedule / by itself going forward.
  keywords:
    - autonomous
    - automatically
    - automate
    - on a schedule
    - scheduled task
    - recurring task
    - every morning
    - every day
    - every night
    - every week
    - each morning
    - routine
    - agentic
    - do this for me
    - going forward
    - from now on
    - on repeat
    - recurring
    - keep me posted
    - keep an eye on
    - each week
    - each night
