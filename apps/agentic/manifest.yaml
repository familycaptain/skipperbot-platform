id: agentic
name: Agentic Tasks
version: "1.0.0"
description: >
  Autonomous scheduled tasks (#109). Skipper running a saved PROMPT on a
  SCHEDULE with a chosen set of tool CATEGORIES. The prompt lives in a document
  (d-*); the schedule row IS the task (its job_config carries the spec); when
  due, an `agentic` job runs the prompt through the agent loop. If the task is
  marked needs-attention, its result reaches the family through Skipper's voice.

platform_deps:
  - documents   # the prompt lives in a d-* document (editable in chat or the doc app)
  - schedules   # each agentic task is a public.schedules row; job_config carries the spec
  - jobs        # the `agentic` job_type runs on the dispatcher
  - events

# The generic agentic job handler. A schedule with linked_entity_type='job',
# linked_entity_id='agentic' fires it with the task's job_config as config.
job_types:
  - type: agentic
    handler: agentic.handle_agentic
    max_concurrent: 2
    cancel_on_shutdown: true

# Tool category for the keyword router — surfaces create_agentic_task etc. when
# a family member asks Skipper to do something on its own, on a schedule.
tool_category:
  description: >
    Set up, list, or remove AUTONOMOUS SCHEDULED tasks — Skipper doing a task on
    its own on a recurring schedule (a saved prompt + tools that run every
    morning, nightly, weekly, etc.). Use when the user asks Skipper to do
    something automatically / on a schedule / by itself going forward.
  keywords:
    - autonomous
    - automatically
    - automate
    - on a schedule
    - scheduled task
    - recurring task
    - every morning
    - every day
    - every night
    - every week
    - each morning
    - routine
    - agentic
    - do this for me
    - going forward
    - from now on
