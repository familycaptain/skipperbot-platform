kind: specification
id: evolve.cfs-store.schema-validate
title: The loader validates the C/F/S corpus before projecting it
state: live
behavior: >
  The files→DB scan rejects a malformed corpus rather than projecting it: id↔kind↔path
  agree (depth matches kind, id mirrors the path slugs); a spec's feature and a
  feature's capability resolve; ids are unique; `implements` paths exist (a dangling
  path is flagged drift, not a hard fail); a spec with zero tests is allowed but
  recorded as an `untested` variance; and on `main` every spec is `live` or
  `deprecated`.
implements:
  - apps/evolve/schema.py
  - apps/evolve/store.py
tests:
  - { type: unit, path: tests/evolve/cfs_store/test_schema_validate.py }
autonomy: hands-on
links: { related: [evolve.agents] }
notes: >
  Structural validation only; spec SOUNDNESS (gaps/holes/naive assumptions) is the
  spec-audit agent (evolve.agents), not this check. The `main`-only-live/deprecated
  rule is steady-state — suspended during bootstrap for hand-authored seed specs (§12).
