id: evolve.gates
title: Gates — the two human approvals
state: proposed
links: {}
notes: >
  Implements EVOLVE.md §9. Planned specs: gate-block-resume (a gate node blocks the
  instance, emits a queue item, resumes on response), gate1-intent (approve/change/
  reject the spec), gate2-result (approve/change/reject the review packet),
  change-steer (free-text routes back to the right agent), settle (anti-thrash pin).
  The queue UI itself lives in evolve.app-ui. To be expanded.
