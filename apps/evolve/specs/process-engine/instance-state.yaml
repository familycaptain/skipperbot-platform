kind: specification
id: evolve.process-engine.instance-state
title: Process-instances are durable and resumable
state: live
behavior: >
  Each work-item is a process-instance with a durable position in the graph and a
  transition log. An instance records the node it currently sits at, the C/F/S
  record(s) it touches, and its history. State survives a restart of either box — an
  instance lives hours-to-days across two human gates and must resume exactly where it
  paused.
implements:
  - apps/evolve/engine/instance.py
  - apps/evolve/migrations/002_process_instances.sql
tests:
  - { type: unit, path: apps/evolve/tests/process_engine/test_engine.py }
autonomy: hands-on
links: { related: [evolve.process-engine.walk-step] }
notes: "The BPM 'process instance' = per-work-item C/F/S state (EVOLVE.md §7)."
