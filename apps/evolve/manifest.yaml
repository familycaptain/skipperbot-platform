id: evolve
name: Evolve
version: "0.1.0"
description: >
  Skipper's self-maintaining SDLC engine — the support arm. Ingests work (GitHub
  issues/PRs + proactive design/QA), reconciles the codebase to a declared C/F/S
  desired state through human-gated review, and promotes approved changes
  feature -> release -> main. See specs/EVOLVE.md and the C/F/S tree under
  specs/evolve/. Runs on Claude (Anthropic), separate from the platform's OpenAI
  assistant — by design.

# Bundled but NOT required for the platform to boot (additive). Unlike the legacy
# `issues` app, removing Evolve does not stop Skipper.
core: false

platform_min_version: "1.0.0"

# C/F/S records are FILE-backed truth (specs/evolve/**), projected into app_evolve
# for queries — they are not prefix+hex8 platform entities. Process-instances are
# app-internal state. So no public entity prefixes are owned here.
entity_types: []

platform_deps:
  - db          # the C/F/S + process-instance projection (app_evolve schema)
  - config      # model tiers + budget settings below
  - time        # timestamps on transitions
  - jobs        # each agent invocation runs as a bounded job (EVOLVE.md §7)
  - events      # emits evolve.* lifecycle events

app_deps: []

emits:
  - evolve.instance.started
  - evolve.gate.waiting        # a decision is queued for the human (work queue)
  - evolve.instance.merged     # merged to the release branch
  - evolve.instance.rejected
subscribes: []

# Requires an Anthropic API key (ANTHROPIC_API_KEY). This is a NEW capability,
# distinct from the platform's OpenAI key. TODO: register an "anthropic" capability
# in app_platform/capabilities.py so Settings can surface it.

config:
  - key: model_fast
    type: string
    default: "claude-haiku-4-5-20251001"
    label: "Evolve model — fast tier"
    description: "Claude model for cheap/high-volume agents (triage, prioritize, packet)."
  - key: model_smart
    type: string
    default: "claude-sonnet-4-6"
    label: "Evolve model — smart tier"
    description: "Claude model for the reasoning agents (spec-author, reviews, spec-audit)."
  - key: model_deep
    type: string
    default: "claude-opus-4-8"
    label: "Evolve model — deep tier"
    description: "Claude model for the hardest tasks (reserved; not used by default)."
  - key: cycle_budget_usd
    type: string
    default: "5.00"
    label: "Per-cycle budget (USD)"
    description: "Hard cap on Claude spend per Evolve cycle. Stored as a string for the slider UI."

# The orchestrator (engine/walker) is a DETERMINISTIC tick, not an LLM prompt
# domain — it advances ready process-instances and dispatches agents as jobs.
# TODO(integration): wire orchestrator.run as a background loop (thinking_scheduler
# interval tick or a dedicated runner). Not a prompt_file domain.
thinking: []

# Each agent invocation is a bounded job (heartbeat/kill/retry reuse, EVOLVE.md §7).
job_types:
  - evolve_agent
