id: newsletter
name: Newsletter
version: "1.1.0"
description: >
  Fully automated market-intelligence generation pipeline. Fetches pre-market
  data, market breadth indicators, generates charts, runs LLM synthesis, and
  assembles the Systematic Market Brief document. Email delivery via Resend
  to a managed subscriber list.

platform_deps:
  - documents
  - jobs

entity_types:
  - prefix: "ns"
    name: Newsletter Subscriber
    table: newsletter_subscribers

job_types:
  - type: newsletter_generate
    handler: handlers.handle_generate
    max_concurrent: 1
  - type: newsletter_breadth
    handler: handlers.handle_breadth
    max_concurrent: 1
  - type: newsletter_send
    handler: handlers.handle_send
    max_concurrent: 1

emits:
  - newsletter.edition_generated
  - newsletter.edition_sent
  - newsletter.breadth_collected

subscribes: []
