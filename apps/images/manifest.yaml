id: images
name: Images
version: 1.0.0
description: Photo gallery — browse, view, and manage saved images and generated charts.
onboarding_tour: true  # included in the first-run onboarding tour

# Required core app (REQUIRED_APPS in app_platform/loader.py). This app is the
# VIEWER over the platform-level `image` entity type — the table public.images
# lives in the baseline and the data layer is data_layer/images.py. It registers
# the `image` entity type that Issues (and chart/image generation) depend on, so
# it can't be optional. The app owns the viewer, NOT the table.
core: true

# Tables (public.images) live in the public baseline.
# Backend routes are served by agent.py at /api/apps/images*; this package only
# provides the desktop icon and UI. The loader still creates an empty
# app_images schema, which is fine.
schema: public

entity_types:
  - prefix: img
    name: image
    id_format: "img-{hex8}"
    table: images

tool_category:
  description: "Browse and manage saved images, photos, and generated charts in the gallery"
  keywords:
    - image
    - images
    - photo
    - photos
    - gallery
    - picture

emits: []
subscribes: []
