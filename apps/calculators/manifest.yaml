description: >
  A set of calculators: a standard scientific calculator (default), plus a
  compound-interest calculator and a loan-amortization calculator. The finance
  calculators solve for whichever value you leave blank and show a full payoff
  schedule. Runs entirely in the browser; no data is stored.
