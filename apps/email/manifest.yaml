id: email
name: Email
version: "1.0.0"
description: >
  Gmail integration with OAuth, rule-based email processing, and activity log.
  Connect Gmail accounts, define inbox rules (label, archive, mark read),
  and view processed email history.

platform_deps: []

entity_types:
  - prefix: "ea"
    name: Email Account
    table_name: email_accounts
  - prefix: "er"
    name: Email Rule
    table_name: email_rules
  - prefix: "el"
    name: Email Log Entry
    table_name: email_log

tool_category: null

job_types:
  - type: email
    handler: runner.run_email_sync
    max_concurrent: 1

emits: []
subscribes: []

# Gmail OAuth credentials (Settings → Email). Inbound Gmail requires a
# Tier-3/external deployment + Google OAuth app — see docs. No .env.
config:
  - key: gmail_client_id
    type: string
    label: "Gmail OAuth client ID"
    description: "From your Google Cloud OAuth 2.0 client (Web application)."
  - key: gmail_client_secret
    type: string
    secret: true
    label: "Gmail OAuth client secret"
    description: "The client secret paired with the client ID above."
  - key: gmail_redirect_uri
    type: string
    label: "OAuth redirect URI"
    description: "Must match the redirect URI registered in Google Cloud. Default: <your public URL>/api/apps/email/oauth/callback"
