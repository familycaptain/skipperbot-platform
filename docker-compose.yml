# =============================================================================
# Skipperbot Platform — docker-compose.yml
# =============================================================================
# Recommended install path for first-time users. Brings up Postgres 18 +
# pgvector and the agent in two services with proper volumes so user data,
# installed apps, and built artifacts survive container restarts and image
# rebuilds.
#
# Usage:
#   1. cp .env.example .env
#   2. Edit .env — set OPENAI_API_KEY and POSTGRES_PASSWORD.
#      SKIPPERBOT_DB_DSN should reference the 'db' host (see .env.example).
#   3. docker compose up
#   4. Open http://localhost:8000 to begin onboarding

services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: skipperbot_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: skipperbot
    volumes:
      # Postgres 18+ stores data in major-version-specific subdirectories
      # under /var/lib/postgresql (e.g. /var/lib/postgresql/18/main) so that
      # in-place pg_upgrade works. The volume must be mounted at the parent
      # path, NOT at /var/lib/postgresql/data — mounting the old location
      # makes pg18 refuse to start with a long "Counter to that..." error.
      # See https://github.com/docker-library/postgres/pull/1259.
      - skipper-db:/var/lib/postgresql
      # Runs once on first DB initialization to install the pgvector extension.
      # The user never needs to manually CREATE EXTENSION.
      - ./deploy/docker-initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skipperbot_user -d skipperbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  agent:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # ---- bind mounts (host filesystem, user-visible) ----------------------
      #
      # Bind-mount the entire repo into /app so that `git pull` on the host
      # takes effect on the next `docker compose down/up` without needing a
      # full image rebuild. Covers platform Python (agent.py, chat_domain.py,
      # config.py, app_platform/, data_layer/, scripts/, migrations/, ...),
      # the web frontend source (web/src, web/vite.config.js, etc.), and the
      # apps/ tree (which the user also extends by cloning optional apps).
      #
      # The two anonymous volumes below mask paths inside /app where the
      # image's content should win over the host's:
      #   - web/node_modules: installed by `npm ci` during image build; the
      #     host may not have these installed at all (e.g. on a Pi without
      #     node) so the host's empty dir would shadow the deps.
      #   - web/dist: rebuilt fresh by deploy/entrypoint.sh on every start.
      #     Keeping it container-only avoids root-owned dist files leaking
      #     onto the host and avoids stale host dist shadowing fresh builds.
      - .:/app
      - /app/web/node_modules
      - /app/web/dist
      #
      # ---- named volumes (agent-managed, user shouldn't need to touch) -----
      #
      # User-uploaded files (recipe images, document attachments, etc.)
      - skipper-uploads:/app/uploads
      #
      # Local DB backups
      - skipper-backups:/app/backups
      #
      # Logs
      - skipper-logs:/app/logs
    restart: always

volumes:
  skipper-db:
  skipper-uploads:
  skipper-backups:
  skipper-logs:
