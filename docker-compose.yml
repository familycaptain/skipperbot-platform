# =============================================================================
# Skipperbot Platform — docker-compose.yml
# =============================================================================
# Recommended install path for first-time users. Brings up Postgres 18 +
# pgvector and the agent in two services with proper volumes so user data,
# installed apps, and built artifacts survive container restarts and image
# rebuilds.
#
# Usage:
#   1. cp .env.example .env
#   2. Edit .env — set OPENAI_API_KEY and POSTGRES_PASSWORD. That's it; the
#      agent derives its DB connection from POSTGRES_PASSWORD (no separate DSN).
#   3. docker compose up
#   4. Open http://localhost:8000 to begin onboarding

services:
  db:
    image: pgvector/pgvector:pg18
    # Publish Postgres to the host so LAN clients (DBeaver, psql, etc.) can
    # connect at <host>:5432 — e.g. your-skipper-host.local:5432. Auth still required
    # (POSTGRES_PASSWORD). The agent reaches the DB in-network as db:5432
    # regardless; this is only for external tooling. Override the host port via
    # POSTGRES_PORT in .env if 5432 is taken on the host.
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      # User/DB default to these names but can be overridden in .env. The
      # agent derives its connection from the SAME vars (plus DB_HOST below),
      # so POSTGRES_PASSWORD is the only value you must set — no separate DSN.
      POSTGRES_USER: ${POSTGRES_USER:-skipperbot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-skipperbot}
    volumes:
      # Postgres 18+ stores data in major-version-specific subdirectories
      # under /var/lib/postgresql (e.g. /var/lib/postgresql/18/main) so that
      # in-place pg_upgrade works. The volume must be mounted at the parent
      # path, NOT at /var/lib/postgresql/data — mounting the old location
      # makes pg18 refuse to start with a long "Counter to that..." error.
      # See https://github.com/docker-library/postgres/pull/1259.
      - skipper-db:/var/lib/postgresql
      # Runs once on first DB initialization to install the pgvector extension.
      # The user never needs to manually CREATE EXTENSION.
      - ./deploy/docker-initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skipperbot_user -d skipperbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  agent:
    build:
      context: .
      args:
        # Voice speaker-ID opt-in: interpolated from .env (default 0). Persisted by
        # `./skipper.sh enable-voice`; the Dockerfile installs requirements-voice.txt
        # only when 1, so `skipper update` rebuilds honor it with no tracked-file edit.
        SKIPPER_VOICE: ${SKIPPER_VOICE:-0}
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Published port is configurable via SKIPPERBOT_PORT in .env (default
      # 8000). The agent inside the container binds the SAME value (it reads
      # SKIPPERBOT_PORT from env_file below), so host and container ports always
      # match and the variable means the same thing for native and Docker.
      - "${SKIPPERBOT_PORT:-8000}:${SKIPPERBOT_PORT:-8000}"
    environment:
      # The agent builds its DSN from POSTGRES_* (read from .env) + this host,
      # which is the compose service name of the database. Set SKIPPERBOT_DB_DSN
      # in .env only if you need a full custom/external connection string.
      DB_HOST: db
      # glibc: retain fewer heap arenas so less RSS is held under allocation churn.
      MALLOC_ARENA_MAX: "2"
    env_file:
      - .env
    volumes:
      # ---- bind mounts (host filesystem, user-visible) ----------------------
      #
      # Bind-mount the entire repo into /app so that `git pull` on the host
      # takes effect on the next `docker compose down/up` without needing a
      # full image rebuild. Covers platform Python (agent.py, chat_domain.py,
      # config.py, app_platform/, data_layer/, scripts/, migrations/, ...),
      # the web frontend source (web/src, web/vite.config.js, etc.), and the
      # apps/ tree (which the user also extends by cloning optional apps).
      #
      # The two anonymous volumes below mask paths inside /app where the
      # image's content should win over the host's:
      #   - web/node_modules: installed by `npm ci` during image build; the
      #     host may not have these installed at all (e.g. on a Pi without
      #     node) so the host's empty dir would shadow the deps.
      #   - web/dist: rebuilt fresh by deploy/entrypoint.sh on every start.
      #     Keeping it container-only avoids root-owned dist files leaking
      #     onto the host and avoids stale host dist shadowing fresh builds.
      - .:/app
      - /app/web/node_modules
      - /app/web/dist
      #
      # ---- named volumes (agent-managed, user shouldn't need to touch) -----
      #
      # User-uploaded files (recipe images, document attachments, etc.)
      - skipper-uploads:/app/uploads
      #
      # Local DB backups
      - skipper-backups:/app/backups
      #
      # Logs
      - skipper-logs:/app/logs
    # Defensive memory containment: a future runaway restarts the container instead
    # of OOM-killing the host process (on the Pi 5 that tripped a hardware-watchdog
    # hard-reset). Overridable WITHOUT editing this tracked file via AGENT_MEM_LIMIT
    # in .env (prod runs a hand-set cap; default 6g — baseline RSS ~4.7GB). memswap
    # == mem_limit makes 6g a TRUE RAM ceiling (else Docker allows 2x in swap, which
    # would swap-thrash the Pi before the OOM-kill). PREREQUISITE on Raspberry Pi OS:
    # the kernel cgroup memory controller must be enabled or mem_limit is a silent
    # no-op — see docs/00-pi-hardware-and-setup.md (cmdline.txt cgroup_enable=memory).
    mem_limit: ${AGENT_MEM_LIMIT:-6g}
    memswap_limit: ${AGENT_MEM_LIMIT:-6g}
    # unless-stopped (not always): auto-restart a runaway, but respect a deliberate
    # `docker stop`.
    restart: unless-stopped

volumes:
  skipper-db:
  skipper-uploads:
  skipper-backups:
  skipper-logs:
