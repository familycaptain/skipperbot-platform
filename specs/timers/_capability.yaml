scope: 'Short, in-memory countdown timers (sub-30-minute: cooking, pomodoros) that fire a notification
  when they expire. Ephemeral — each timer is an asyncio task with no database row; the only persisted
  artifact is the notification on expiry. NOT long-term reminders (the Reminders app) or recurring
  schedules (the Schedules app).'
