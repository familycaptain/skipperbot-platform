kind: specification
id: evolve.process-engine.walk-step
title: Advancing an instance dispatches node work and applies gateway logic
state: proposed
behavior: >
  On each tick the engine advances ready instances. For an `agent` node it dispatches
  the agent (as a job, EVOLVE.md §7); for a `system` node it runs the deterministic
  step; for a `gate` node it blocks the instance and emits a work-queue item; an
  `event` end node closes the instance. Gateways are pure control flow: an `exclusive`
  gateway takes the single branch whose `when` condition holds; a `parallel` gateway
  fans out to all targets and a matching join waits for all of them. Advancing is
  idempotent — re-entry after a restart never double-runs a step or loses work.
implements:
  - apps/evolve/engine/walker.py
tests:
  - { type: unit, path: tests/evolve/process-engine/test_walk_step.py }
autonomy: hands-on
links: { related: [evolve.process-engine.instance-state, evolve.agents] }
notes: "The orchestrator runs as a thinking domain (EVOLVE.md §7)."
