kind: specification
id: evolve.cfs-store.boot-sync
title: Boot scans specs/** into the DB projection
state: proposed
behavior: >
  On startup, Evolve scans specs/**/*.yaml, ingests every file whose top-level
  `kind` is capability|feature|specification, checksums each, and upserts it into the
  DB projection (mirroring how the platform migration runner tracks files in
  public.platform_migrations). Files without a `kind` (design docs, the process
  model) are ignored. After boot, the DB mirrors committed truth and is queryable for
  the Evolve UI.
implements:
  - apps/evolve/store.py
  - apps/evolve/migrations/001_cfs_tables.sql
tests:
  - { type: unit, path: tests/evolve/cfs-store/test_boot_sync.py }
autonomy: hands-on
links: { related: [evolve.cfs-store.edit-serialize] }
notes: "Files→DB direction. The reverse (DB→files) is evolve.cfs-store.edit-serialize."
