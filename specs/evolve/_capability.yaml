kind: capability
id: evolve
title: Evolve — self-maintaining SDLC engine
app: evolve
scope: >
  The engine that keeps Skipper maintainable at scale: it ingests work (GitHub
  issues/PRs + proactive design/QA), reconciles the codebase to a declared C/F/S
  desired state through human-gated review, and promotes approved changes
  feature → release → main. In scope: the C/F/S store, the BPM process engine, the
  agent runner, the two gates + work queue, box-1/box-2 build+validate, and the
  release-branch promotion. NOT in scope: touching production (the Pi) directly,
  auto-publishing to the world (the release gate is operator-owned), or running
  family-facing assistant features (those are other capabilities Evolve maintains).
autonomy: hands-on        # Evolve-core is the dangerous self-mod (EVOLVE.md §11): strictest gate, never unattended
state: proposed           # bootstrap seed — hand-authored, greenfield/spec-first, not yet built
links: {}
notes: >
  This tree is the recursive-bootstrap forcing function (EVOLVE.md §12): the first
  C/F/S we write describes Evolve itself, hand-authored before the engine exists.
  Expect heavy iteration. Specs are `proposed` until the corresponding code + bound
  tests exist and conform. `implements` paths point at the intended apps/evolve/
  home (EVOLVE.md §10), most of which is not built yet. NOTE: the `main`-only-holds-
  live/deprecated invariant (§4) is a STEADY-STATE rule — it is suspended for these
  hand-authored bootstrap seeds until Evolve self-hosts and reconciles them.
