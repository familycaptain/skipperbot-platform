scope: A pure-UI launcher tile that aggregates search across the apps owning the underlying data
  (goals, documents, recipes, reminders, schedules, …). Owns no schema, tables, migrations, chat
  tools, or REST routes — every search dispatches to the owning app. NOT a data store itself;
  Finder is a unified cross-app search surface.
