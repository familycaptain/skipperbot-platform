id: notifications.delivery.fan-out-delivery
title: Record & deliver a notification
state: live
autonomy: gated
behavior: A notification event is recorded as a row, then the background delivery loop sends it
  to the user over each configured/available channel (Discord DM, Pushover, WebSocket, chat log,
  FCM), marking it delivered once any channel succeeds.
