kind: specification
id: platform.app-help.route-precedence
title: In-app help route resolves for every app
state: live
autonomy: gated
behavior: GET /api/apps/<app_id>/help returns the app's help.md markdown (HTTP 200, non-empty
  {help} when the file exists) for EVERY loaded app, including those that also expose a per-app
  GET /api/apps/<app_id>/{param} route (goals, documents, images, lists, brainstorming, backups,
  schedules, folders). The help route is registered ahead of the per-app parametric routes
  so the literal 'help' segment is never captured as an entity id. The per-app {param} entity
  endpoints continue to work unchanged for all non-'help' ids. help.md content, the web Help
  panel, and the handler body are unchanged; this is purely route precedence.
implements:
- agent.py
tests:
- type: unit
  path: tests/evolve/platform/test_app_help_route.py
  rubric: 'Deterministic/offline AST source-order analysis of agent.py (no app import, no
    HTTP, no DB — same approach as test_agent_no_app_imports.py; a runtime TestClient is not
    viable offline here because the global auth middleware + the app-loading lifespan would
    block/!404 a bare request). Asserts: (1) exactly one GET /api/apps/{app_id}/help route;
    (2) its decorator line precedes EVERY per-app GET /api/apps/<app>/{param} route whose
    {param} is the final segment (the precise shape that shadows /api/apps/<app>/help) — so
    help wins for ALL current AND future apps, not just the 8 named (a new app''s /{param}
    route registered before help would fail this); (3) each reported app (goals, documents,
    images, lists, brainstorming, backups, schedules, folders) actually exposes such a /{param}
    GET (premise guard); (4) each ships a non-empty apps/<id>/help.md so real content renders
    once routed. Fails on baseline (help registered after the per-app routes -> 9 offenders)
    and passes after the reorder (0 offenders).'
- type: acceptance
  path: 'live: in-app Help for shadowed apps'
  rubric: 'Driving the live web UI: open two formerly-shadowed apps with DIFFERENT entity-id
    shapes (e.g. Lists and Goals), click the (?) help icon — each renders the real help.md
    guide, NOT ''help is coming soon''.'
links: {}
notes: 'Single-file route-precedence fix in agent.py, following the file''s existing ''moved
  above to avoid route conflict'' precedent. Recommended design fork A (accept that ''help''
  is reserved for these apps'' path segment; entity ids are numeric/uuid). Out of scope: the
  already-fixed HTTPException 500 (b940941). Spec unverified until the bound test passes on
  box 2. | REVISED (r1) per spec-audit + architecture: the bound test now (1) loads/monkeypatches
  get_loaded_apps so it exercises route PRECEDENCE rather than tripping the manifest 404 guard,
  (2) is STRUCTURAL — iterates every loaded app with a help.md so future apps are covered,
  not just the 8 named, and (3) asserts the unknown-app path 404s (pinning the b940941 HTTPException-import
  fix). Build base = release b940941 (operator''s HTTPException fix already merged). UX''s
  ''coming soon'' empty-state reword is a noted OUT-OF-SCOPE follow-up. | BUILT: the bound
  test is realized as a deterministic AST source-order check (chosen over a runtime TestClient,
  which the offline auth middleware + app-loading lifespan would block); it is structural
  (covers all current+future apps) and verified GREEN on box 2 (4/4; red on baseline).'
verified: true
