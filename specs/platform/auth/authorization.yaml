kind: specification
id: platform.auth.authorization
title: Principal & role authorization
state: live
autonomy: gated
behavior: Requests are authorized by principal and role; non-browser clients (voice, mobile) use
  service tokens.
implements:
- app_platform/auth.py
- data_layer/service_tokens.py
tests: []
links: {}
notes: 'The sb_session httpOnly cookie (platform.auth.cookie-session) is a valid credential
  transport for SAFE (GET/HEAD) requests only; the Authorization header remains primary
  and is the only accepted transport for mutating methods.'
