kind: specification
id: platform.onboarding.admin-password-confirm
title: Onboarding admin-creation requires a confirmed (double-entered) password
state: live
behavior: 'In the first-run onboarding admin-creation step (web/src/pages/Onboarding.jsx CreatePrimaryUser),
  the form has BOTH a Password and a Confirm-password field. The Confirm input mirrors the
  Password input''s STYLING and posture (type=password, autoComplete=''new-password'', IME-safe
  onKeyDown, same class) but has its OWN name=''confirm_password'' (NOT name=''password''
  — two identically-named inputs break autofill). Create-account is DISABLED unless the username
  is valid AND passwordOk (length>=8) AND password===confirm (confirmOk = passwordOk && password===confirm;
  since equality forces equal length, this subsumes ''confirm non-empty and >=8''). A rose
  (error-colored) inline ''Passwords don''t match'' hint appears once the user has plausibly
  finished the second entry — gated on `confirm.length>=password.length && password!==confirm`
  (NOT every keystroke) — and submit() ALSO blocks with the same message via the existing
  ErrorLine backstop, so a mistyped password can never be saved (preventing a sole-admin lockout;
  no self-service reset exists). When Create-account is disabled, a faint disabled-reason
  line explains why (mirroring ModelStep''s existing ''Validate all three tiers to continue.''
  affordance). The confirm value is client-only: the create-user POST body stays exactly {username,
  display_name, password, timezone}. The form obeys platform.webui.forms-no-native-submit.'
implements:
- web/src/pages/Onboarding.jsx (CreatePrimaryUser) — `confirm` state (~L130); `confirmOk =
  passwordOk && password===confirm` (~L150); a Confirm-password <input name='confirm_password'
  type=password autoComplete='new-password' onKeyDown={onInputKeyDown}> mirroring the Password
  field's class after it; a ROSE inline 'Passwords don't match' hint gated on `confirm.length>=password.length
  && password!==confirm`; a faint disabled-reason line when the button is disabled (mirror
  ModelStep L399-401); button gate `disabled={saving||!usernameOk||!passwordOk||!confirmOk}`
  (~L291); a confirm guard in submit() after the passwordOk check (setError + ErrorLine).
- web/scripts/check-onboarding-confirm.mjs (NEW) — wired into web/ prebuild (like check-tz-offset/check-no-native-submit);
  presence-only regression guard.
tests:
- type: e2e
  path: (test host, validate-time)
  rubric: 'Drive onboarding to the admin step via the concrete non-destructive intercept (Playwright,
    test-host venv: route-intercept GET /api/onboarding/status->needs_onboarding=true; stub
    GET /api/onboarding/models + POST /api/onboarding/validate-tier + POST /api/onboarding/save-models
    ok; block the PWA service worker) — the exact method proven in reproduce. ASSERT: (1)
    TWO password inputs (Password + Confirm-password, distinct labels); (2) valid username
    + MATCHING >=8 passwords -> Create-account ENABLED, no mismatch hint; (3) confirm differing
    (once length>=password) -> LIVE rose inline ''Passwords don''t match'' shown AND Create-account
    DISABLED; (4) fixing confirm to match -> hint clears + button re-enables. Screenshot the
    confirm field AND the mismatch state -> attach to #56. No account created.'
- type: unit
  path: web/scripts/check-onboarding-confirm.mjs (node static guard; no JS unit runner)
  rubric: 'Node static regression guard over Onboarding.jsx source (presence-only; e2e owns
    correctness): assert a `confirm` state, a second type=password input named ''confirm_password'',
    and the Create-account button''s disabled= expression includes the confirm/match term;
    AND assert the create-user fetch body still lists exactly {username, display_name, password,
    timezone} and does NOT include confirm/confirm_password (covers the ''confirm never sent''
    invariant). Wired into web/ prebuild. Exit non-zero on failure.'
links: {}
notes: 'Frontend-only; create-user payload unchanged (confirm never sent — asserted by the
  static guard). Obeys platform.webui.forms-no-native-submit (name=''confirm_password'', not
  a literal name mirror). UX (folded): mismatch hint is rose + non-nagging (confirm.length>=password.length),
  + a disabled-reason line. Separate follow-up (NOT here): host-side sole-admin password reset.
  Placed under platform.onboarding (sibling to timezone-offset). | Gate-2: validated GREEN
  on test host — node guard exit 0 (10/10, incl. confirm-never-sent) + forms-no-native-submit
  guard green; e2e: two password fields, enabled-on-match, DISABLED + rose ''Passwords don''t
  match'' + disabled-reason on mismatch, re-enabled on fix. verified=true.'
verified: true
