kind: specification
id: platform.onboarding.timezone-offset
title: Onboarding timezone dropdown shows UTC offset per option and sorts by offset then name
state: live
behavior: 'In the first-run onboarding step-3 Timezone `<select>` (web/src/pages/Onboarding.jsx),
  each option''s LABEL reads `<IANA zone> (UTC±HH:MM)` (operator''s format) where the offset is the
  CURRENT (DST-aware) offset, and options are SORTED by offset minutes ascending then IANA name
  ascending — a total, deterministic order (e.g. `Asia/Kolkata (UTC+05:30)`, `America/New_York
  (UTC-05:00)`, `Etc/UTC (UTC+00:00)`, minutes PRESERVED). Each option `value` stays the raw IANA id
  (NOT the label): the `tz` state + create-user POST are unchanged and preselection is intrinsic to
  the controlled `value={tz}`; the detected/selected zone stays present post-sort. SUPERSEDED BY #72
  (platform.onboarding.timezone-shared-source): the label+sort logic now lives SERVER-SIDE in the
  shared `app_platform/time.py::timezone_choices()` (full IANA set, stdlib datetime+zoneinfo), served
  to onboarding via the pre-login `GET /api/onboarding/timezones` and used byte-identically by the
  Settings app — replacing the retired frontend `web/src/utils/tz.js` helper and the curated 24-zone
  list. An un-formattable zone is skipped (never mislabeled as UTC+00:00).'
implements:
- app_platform/time.py — `timezone_choices() -> [{value,label}]`: full `available_timezones()`,
  DST-aware `<name> (UTC±HH:MM)` labels, sort by (offset, name); stdlib-only offset logic.
- agent.py — pre-login `GET /api/onboarding/timezones` (in `_PUBLIC_EXACT`) returns the list via
  `asyncio.to_thread(timezone_choices)`; no `apps.*` import (platform->platform).
- web/src/pages/Onboarding.jsx — fetches `/api/onboarding/timezones` on mount, renders the server
  `{value,label}` list, preserves browser auto-detect + hint, dedups the detected option, falls back
  to `[detected,'Etc/UTC']` on fetch failure.
tests:
- type: unit
  path: tests/test_timezone_choices.py (python unittest)
  rubric: 'Deterministic test of app_platform.time.timezone_choices(): (a) full IANA set (>100);
    (b) every label matches `<name> (UTC±HH:MM)`; (c) Etc/UTC -> ''Etc/UTC (UTC+00:00)''; (d)
    America/New_York label in {UTC-04:00, UTC-05:00} (DST range); (e) HALF-HOUR zone Asia/Kolkata
    -> ''Asia/Kolkata (UTC+05:30)'' (minutes survive); (f) SORT invariant: monotonic non-decreasing
    by (offset-minutes, name); (g) never raises across the full set (invalid zones skipped).
    (Re-homes the retired web/scripts/check-tz-offset.mjs #55 assertions onto the server function.)'
- type: e2e
  path: (test host, validate-time)
  rubric: 'Onboarding step-3 Timezone dropdown on the disposable test host: ASSERT (1) every option
    LABEL matches `<zone> (UTC±HH:MM)`; (2) every option VALUE is the raw IANA id (value != label);
    (3) options are the FULL IANA list from the shared source (not 24 curated) — count matches the
    Settings dropdown; (4) the MONOTONIC INVARIANT holds (each parsed offset >= previous, ties by
    name asc); (5) the detected/selected zone is preselected. Screenshot the open dropdown -> #72.'
links: {}
notes: 'Offset is CURRENT DST-aware. SUPERSEDED BY #72 (platform.onboarding.timezone-shared-source):
  the offset label+sort moved from the frontend `web/src/utils/tz.js` helper (retired, with its
  node gate `web/scripts/check-tz-offset.mjs`) to the shared server function
  `app_platform/time.py::timezone_choices()`, so onboarding and Settings render ONE full-IANA list.
  value=IANA id stays LOAD-BEARING (interop). Original #55 shipped zone-first labels + a curated
  ~24-zone list; #72 keeps the label format but converges onboarding onto the full Settings source.'
verified: true
